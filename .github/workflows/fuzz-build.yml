name: fuzz-build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-fuzz-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Build order_flow
        run: cargo +nightly fuzz build order_flow

      - name: Build replay_consistency
        run: cargo +nightly fuzz build replay_consistency
